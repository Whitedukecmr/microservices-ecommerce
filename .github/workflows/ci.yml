name: CI/CD - Microservices E-Commerce

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat <<EOF > .env
          MYSQL_DATABASE=catalog_db
          MYSQL_USER=catalog_user
          MYSQL_PASSWORD=catalog_pass
          MYSQL_ROOT_PASSWORD=rootpass
          POSTGRES_DB=orders_db
          POSTGRES_USER=orders_user
          POSTGRES_PASSWORD=orders_pass
          RABBITMQ_DEFAULT_USER=guest
          RABBITMQ_DEFAULT_PASS=guest
          CATALOG_SERVICE_URL=http://catalog-service:8001
          CART_SERVICE_URL=http://cart-service:8002
          CHECKOUT_SERVICE_URL=http://checkout-service:8003
          ORDERS_SERVICE_URL=http://orders-service:8004
          REDIS_HOST=redis
          REDIS_PORT=6379
          DYNAMODB_ENDPOINT=http://dynamodb-local:8000
          AWS_REGION=us-east-1
          AWS_ACCESS_KEY_ID=fakeMyKeyId
          AWS_SECRET_ACCESS_KEY=fakeSecretAccessKey
          EOF

      - name: Validate docker compose file
        run: docker compose config

      - name: Build containers
        run: docker compose build

  dockerhub-push:
    needs: validate-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web-ui
        uses: docker/build-push-action@v6
        with:
          context: ./web-ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-ui:latest

      - name: Build and push catalog-service
        uses: docker/build-push-action@v6
        with:
          context: ./catalog-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest

      - name: Build and push cart-service
        uses: docker/build-push-action@v6
        with:
          context: ./cart-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest

      - name: Build and push checkout-service
        uses: docker/build-push-action@v6
        with:
          context: ./checkout-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/checkout-service:latest

      - name: Build and push orders-service
        uses: docker/build-push-action@v6
        with:
          context: ./orders-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/orders-service:latest